# /* ---- 💫 https://github.com/LinuxBeginnings 💫 ---- */  #

# you can choose themes from $HOME/.config/kitty/kitty-themes/
include ./kitty-themes/01-Wallust.conf

font_family FantasqueSansM Nerd Font Mono
font_size 16.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto
allow_remote_control yes

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

# Open links in browser and jump to its Hyprland workspace
url_style curly
url_color #7dcfff
open_url_with ${HOME}/.local/bin/open-url-hypr

# Ctrl+click OR Ctrl+Shift+click on a URL / hyperlink
mouse_map ctrl+left click ungrabbed mouse_handle_click link
mouse_map ctrl+shift+left click ungrabbed mouse_handle_click link

# foreground/background/cursor are set by the active theme
