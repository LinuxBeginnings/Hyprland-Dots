# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME

##############
#  Rebinds   #
##############

# Screenshot keybindings NOTE: You may need to press Fn key as well

unbind = $mainMod, Print, screenshot now, exec, $scriptsDir/ScreenShot.sh --now
unbind = $mainMod SHIFT, Print, screenshot (area), exec, $scriptsDir/ScreenShot.sh --area
unbind = $mainMod CTRL, Print, screenshot in 5s, exec, $scriptsDir/ScreenShot.sh --in5
unbind = $mainMod CTRL SHIFT, Print, screenshot in 10s, exec, $scriptsDir/ScreenShot.sh --in10
unbind = ALT, Print, screenshot active window, exec, $scriptsDir/ScreenShot.sh --active
unbind = $mainMod SHIFT, S, screenshot (swappy), exec, $scriptsDir/ScreenShot.sh --swappy

bindd = $mainMod, Home, screenshot now, exec, $scriptsDir/ScreenShot.sh --now
bindd = $mainMod SHIFT, Home, screenshot (area), exec, $scriptsDir/ScreenShot.sh --area
bindd = $mainMod CTRL, Home, screenshot in 5s, exec, $scriptsDir/ScreenShot.sh --in5
bindd = $mainMod CTRL SHIFT, Home, screenshot in 10s, exec, $scriptsDir/ScreenShot.sh --in10
bindd = ALT, Home, screenshot active window, exec, $scriptsDir/ScreenShot.sh --active
# screenshot with swappy (another screenshot tool)
bindd = $mainMod SHIFT, S, screenshot (swappy), exec, $scriptsDir/ScreenShot.sh --swapp

unbind = $mainMod CTRL, F, maximize window, fullscreen, 1
bindd = $mainMod, F, maximize window, fullscreen, 1
unbind = $mainMod SHIFT, Return, DropDown terminal, exec, $scriptsDir/Dropterminal.sh $term
bindd = $mainMod SHIFT, T, DropDown terminal, exec, $scriptsDir/Dropterminal.sh $term

unbind = $mainMod CTRL, left, move window left, movewindow, l
unbind = $mainMod CTRL, right, move window right, movewindow, r
bindd = $mainMod CTRL, left, Next workspace, workspace, m+1 
bindd = $mainMod CTRL, right, previous workspace, workspace, m-1 

bindd = $mainMod SHIFT, D, DWM vertical menu, exec, rofi -config ~/.config/rofi/dwm-config-vert.rasi -show drun
bindd = $mainMod CTRL, D, DWM Horizontal  menu, exec, rofi -config ~/.config/rofi/dwm-config-horiz.rasi -show drun



##############
#  unbinds   #
##############

unbind = $mainMod, N, Toggle Hyprsunset - night light, exec, $scriptsDir/Hyprsunset.sh toggle
unbind = $mainMod SHIFT, W, wallpaper effects, exec, $UserScripts/WallpaperEffects.sh
unbind = CTRL ALT, W, random wallpaper, exec, $UserScripts/WallpaperRandom.sh
unbind = $mainMod SHIFT, O, change oh-my-zsh theme, exec, $UserScripts/ZshChangeTheme.sh
unbind = ALT_L, SHIFT_L, switch keyboard layout globally, exec, $scriptsDir/KeyboardLayout.sh switch
unbind = SHIFT_L, ALT_L, switch keyboard layout per-window, exec, $scriptsDir/Tak0-Per-Window-Switch.sh

# Move windows
unbind = $mainMod CTRL, up, move window up, movewindow, u
unbind = $mainMod CTRL, down, move window down, movewindow, d


# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
